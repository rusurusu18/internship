<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- dom(document object model) is a programming interface that represents the html document as a tree objects -->
<!-- javascript uses dom to change the text, change colors, add html elements read input values and many more. -->

<!-- common methods to access html elements are :
 getElementById () selects the html elements by their ID
 getElementByClassName()  selects the html elements by their class name
 getElementByTagName()      selects the html elements by their tag name
 querySelector()    selects the first matching element
 querySelectorAll()   selects all matching elements -->



    <!-- <h1 id="h1id" class="first" style="background-color:brown; color:beige">Hello, World!</h1>
    <h1 class="second">This is my second heading</h1> -->

    <p>html</p>
    <p>css</p>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRVwGMLVhhKX2WbOpmbGhmsfkSi8rkHzMyGSk6qkLLDOQ&s=10" alt="image" width="200px" height="200px">

    <br>
    <button onclick="showAlert()" onmouseover="firstmouseover()">Click me</button>



    <button class="first">Hover over me</button>

    <script>
        //let heading = document.getElementById("first")
        //heading.innerHTML = "Welcome to DOM Manipulation"
       // heading.style.backgroundColor = "blue"

        //if it was className
        //let heading= document.getElementsByClassName("first")
        //heading[0].innerHTML = "Welcome to DOM Manipulation"
       // heading[0].style.backgroundColor = "blue"
   
        //if it was tagName
        //let heading= document.getElementsByTagName("h1")
        //heading[0].innerHTML = "Welcome to DOM Manipulation"

        //access the element by querySelector
        //let heading = document.querySelector("h1"); //aabo h1 jun first ma xa teslai matra change garxa also can use id(#) and class name(.) 
        //heading.innerHTML = "Hello, DOM Manipulation"

        //querySelectorAll() selects all matching elements
        //let paragraphs = document.querySelectorAll("h1");
        //paragraphs[1].innerHTML = "This is my heading changed by querySelectorAll()"
        //paragraphs[1].style.backgroundColor = "blue"        //jun index deko xa teslai matra garxa

        let paragraphs = document.querySelectorAll("p");
        for(let i=0; i<paragraphs.length; i++){
            paragraphs[i].style.backgroundColor = "blue";
            paragraphs[i].style.color = "white";
            paragraphs[i].innerHTML = "This is my paragraph changed by querySelectorAll()";
        }

        let image = document.getElementsByTagName("img");
        image[0].src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMGEiGGm6dPSJwJ5zU1h-iD8ff6tpQVRUOUgOQSqpogQ&s=10" ;
        image[0].alt = "new image";


        function showAlert(){
            alert("Button clicked!");
        }

        function firstmouseover(){
            let heading = document.querySelector("button");
            heading.innerHTML = "Mouse is over the heading";
            heading.style.backgroundColor = "blue";
        }


        //event listener
        let button = document.querySelector(".first");
        button.addEventListener("click", function(){
            alert("Button clicked using event listener!");
        });

    </script>

    <!--event and event listener-->
  
    <!--event is an action that occurs in browser or web page like click, mouseover, keydown, etc.-->
    <!--click() occurs when the user clicks on an element-->
    <!--mouseover() occurs when the user moves the mouse over an element-->
    <!--onChange() occurs when the value of an element is changed-->
    <!--onKeyDown() occurs when the user presses a key on the keyboard-->
    <!--onSubmit() occurs when the user submits a form-->
    <!--onload() occurs when the web page is loaded-->

</body>
</html>
