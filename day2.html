    <form>
        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter your name" required><br>

        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter your email" required><br>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter your password" required><br

        <label>Phone Number:</label>
        <input type="tel" name="phone" placeholder="Enter your phone number" required><br>

        <label>Gender:</label>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female <br>  
        
        <select name="Department">
            <option value="cs">OPD</option>
            <option value="it">Child</option>
            <option value="ece">Orthodontics</option>
        </select>
        <br>

        <label>Address:</label>
        <textarea name="address" placeholder="Enter your address" required></textarea><br>
        <label>Upload your file :</label>
        <input type="file" name="file" required><br>
        <button type="submit">Submit</button>
    </form>
